<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Outbound Picking - DC7171</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.44.0/tabler-icons.min.css">
<style>
  :root{
    --teal-50:#E1F5EE; --teal-100:#9FE1CB; --teal-400:#1D9E75; --teal-600:#0F6E56; --teal-800:#085041; --teal-900:#04342C;
    --bg:#F5F6F5; --card:#FFFFFF; --border:#E1E3E0; --text:#1A1D1B; --text-2:#5F6560; --text-muted:#8B9089;
    --danger:#C1352C; --danger-bg:#FBEAE8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent;
  }
  .app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--card); position:relative;}
  .header{background:var(--teal-600); color:#fff; padding:16px 18px 20px;}
  .header-top{display:flex; align-items:center; gap:10px;}
  .logo-box{width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .logo-box i{font-size:22px;}
  .header-title{font-size:16px; font-weight:600;}
  .header-sub{font-size:12px; opacity:0.85;}
  .content{padding:16px 18px 90px;}
  label.field-label{font-size:13px; color:var(--text-2); display:flex; align-items:center; gap:6px; margin-bottom:6px; font-weight:500;}
  input[type=date], input[type=text]{
    width:100%; height:44px; border:1px solid var(--border); border-radius:10px; padding:0 12px;
    font-size:15px; background:#fff; color:var(--text); margin-bottom:18px;
  }
  .zone-card{
    display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--border);
    border-radius:12px; background:#fff; margin-bottom:8px; cursor:pointer;
  }
  .zone-card:active{background:#F0F1EF;}
  .zone-icon{width:40px; height:40px; border-radius:10px; background:var(--teal-50); color:var(--teal-800); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .zone-icon i{font-size:19px;}
  .zone-name{font-weight:600; font-size:15px;}
  .zone-meta{font-size:12px; color:var(--text-2); margin-top:2px;}
  .zone-chevron{color:var(--text-muted); font-size:18px;}
  .zone-card-body{flex:1; min-width:0;}
  .zone-top-row{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:2px;}
  .zone-badge{font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; flex-shrink:0;}
  .zone-badge.notstarted{background:var(--bg); color:var(--text-2);}
  .zone-badge.inprogress{background:var(--teal-50); color:var(--teal-800);}
  .zone-badge.done{background:var(--teal-600); color:#fff;}
  .zone-progress-track{height:5px; background:var(--bg); border-radius:4px; overflow:hidden; margin-top:6px;}
  .zone-progress-fill{height:100%; background:var(--teal-400);}
  .zone-card.warning{border-color:#F0D9B5; background:#FFFBF3;}
  .zone-card.warning .zone-icon{background:#FDF3E7; color:#8A5A0F;}
  .zone-badge.warning{background:#FDF3E7; color:#8A5A0F;}
  .zone-card.disabled{cursor:default;}
  .zone-card.disabled:active{background:#FFFBF3;}
  .zone-chevron.warning-icon{color:#C98A1F;}
  .summary-card{background:var(--teal-50); border-radius:12px; padding:14px; margin-bottom:16px;}
  .summary-top{display:flex; justify-content:space-between; font-size:13px; color:var(--teal-800); font-weight:600; margin-bottom:8px;}
  .progress-track{height:6px; background:#fff; border-radius:4px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--teal-400);}
  .worker-pill{display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--bg); border-radius:10px; font-size:12px; color:var(--text-2);}

  /* pick list screen */
  .list-header{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .back-btn{font-size:18px; color:#fff; background:none; border:none; padding:4px; cursor:pointer;}
  .list-header-title{font-weight:600; font-size:15px; display:flex; align-items:center; gap:6px;}
  .list-header-sub{font-size:11px; opacity:0.85;}
  .list-count{font-size:14px; font-weight:600;}
  .item-row{display:flex; align-items:center; gap:10px; padding:12px 4px; border-top:1px solid var(--border);}
  .item-row.next{background:var(--teal-50); border-radius:10px; border-top:none; padding:12px 10px; margin:6px 0;}
  .item-row.checked{opacity:0.5;}
  .item-row.checked .item-title, .item-row.checked .item-desc{text-decoration:line-through;}
  input[type=checkbox]{width:22px; height:22px; flex-shrink:0; accent-color:var(--teal-600);}
  .item-icon{width:32px; height:32px; border-radius:8px; background:var(--teal-50); color:var(--teal-800); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .item-icon i{font-size:16px;}
  .item-title{font-size:14px; font-weight:600;}
  .item-title.accent{color:var(--teal-600);}
  .item-desc{font-size:12px; color:var(--text-2); margin-top:1px;}
  .item-sub{font-size:11px; color:var(--text-muted); margin-top:1px;}
  .item-batch{font-size:15px; font-weight:700; color:var(--text); margin-top:3px;}
  .item-batch-label{font-size:11px; font-weight:500; color:var(--text-2); margin-right:4px;}
  .item-right{display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; margin-left:6px;}
  .item-qty{font-size:20px; font-weight:700; color:var(--teal-800); line-height:1;}
  .item-qty-unit{font-size:11px; color:var(--text-2); font-weight:500;}
  .item-door-badge{font-size:13px; font-weight:700; padding:3px 10px; border-radius:6px; background:var(--teal-600); color:#fff;}
  .empty-state{text-align:center; padding:48px 20px; color:var(--text-2);}
  .empty-state i{font-size:40px; color:var(--teal-600);}
  .empty-state h3{margin:12px 0 4px; font-size:16px; color:var(--text);}

  .toast{
    position:absolute; left:50%; bottom:20px; transform:translateX(-50%) translateY(20px);
    background:#1A1D1B; color:#fff; padding:12px 16px; border-radius:10px; font-size:13px;
    display:flex; align-items:center; gap:12px; opacity:0; transition:all .25s ease; pointer-events:none;
    max-width:90%; line-height:1.4;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}
  .toast button{background:none; border:none; color:var(--teal-100); font-size:13px; font-weight:700; cursor:pointer; padding:8px 4px;}

  .screen{display:none;}
  .screen.active{display:block;}

  /* overview screen */
  .overview-topbar{display:flex; align-items:center; gap:10px;}
  .overview-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
  .ov-stat{background:var(--bg); border-radius:10px; padding:12px;}
  .ov-stat-label{font-size:11px; color:var(--text-2); margin-bottom:4px;}
  .ov-stat-value{font-size:20px; font-weight:600;}
  .ov-zone-row{display:flex; align-items:center; gap:12px; padding:14px; background:#fff; border:1px solid var(--border); border-radius:12px; margin-bottom:8px;}
  .ov-zone-row.alert{background:var(--danger-bg); border-color:#F0B8B4;}
  .ov-zone-icon{width:34px; height:34px; border-radius:8px; background:var(--teal-50); color:var(--teal-800); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .ov-zone-row.alert .ov-zone-icon{background:#fff; color:var(--danger);}
  .ov-zone-icon i{font-size:16px;}
  .ov-zone-body{flex:1;}
  .ov-zone-top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;}
  .ov-zone-name{font-weight:600;}
  .ov-zone-row.alert .ov-zone-name, .ov-zone-row.alert .ov-zone-count{color:var(--danger);}
  .ov-progress-track{height:6px; background:var(--bg); border-radius:4px; overflow:hidden;}
  .ov-zone-row.alert .ov-progress-track{background:#fff;}
  .ov-progress-fill{height:100%; background:var(--teal-400);}
  .ov-zone-row.alert .ov-progress-fill{background:var(--danger);}
  .overview-updated{font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px; margin-bottom:14px;}
  .header-icon-btn{background:rgba(255,255,255,0.15); border:none; color:#fff; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;}
  .header-icon-btn i{font-size:18px;}
  .mode-tabs{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto;}
  .mode-tab{flex-shrink:0; font-size:13px; font-weight:600; padding:8px 14px; border-radius:20px; background:var(--bg); color:var(--text-2); border:none; cursor:pointer;}
  .mode-tab.active{background:var(--teal-600); color:#fff;}
  .loading-state{text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px;}
  .name-warning{display:flex; align-items:center; gap:8px; padding:12px; background:#FDF3E7; border:1px solid #F0D9B5; border-radius:10px; margin-bottom:14px; font-size:13px; color:#8A5A0F;}
  .name-warning i{font-size:18px; flex-shrink:0;}
  .worker-pill.needs-name{background:#FDF3E7; border:1px solid #F0D9B5;}
  .done-banner{display:flex; align-items:center; gap:10px; padding:14px; background:var(--teal-50); border-radius:12px; margin-bottom:6px; color:var(--teal-800);}
  .done-banner i{font-size:24px;}
  .done-banner-title{font-weight:700; font-size:15px;}
  .done-banner-sub{font-size:12px; color:var(--teal-600);}
</style>
</head>
<body>
<div class="app">

  <!-- SCREEN 1: select date + zone -->
  <div class="screen active" id="screen-select">
    <div class="header">
      <div class="header-top">
        <div class="logo-box"><i class="ti ti-building-warehouse"></i></div>
        <div style="flex:1;">
          <div class="header-title">Outbound Picking</div>
          <div class="header-sub">DC7171 Lamphun</div>
        </div>
        <button class="header-icon-btn" onclick="openOverview()" aria-label="ดูภาพรวม"><i class="ti ti-chart-bar"></i></button>
      </div>
    </div>
    <div class="content">
      <label class="field-label"><i class="ti ti-calendar"></i> วันที่ picking</label>
      <input type="date" id="pickDate">

      <div class="summary-card" id="summaryCard" style="display:none;">
        <div class="summary-top">
          <span>ทั้งหมดวันนี้</span>
          <span id="summaryText">0/0</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="summaryFill" style="width:0%"></div></div>
      </div>

      <label class="field-label"><i class="ti ti-map-pin"></i> เลือกโซน</label>
      <div id="zoneList"></div>

      <div class="worker-pill" id="workerPill" style="margin-top:16px;">
        <i class="ti ti-user-circle"></i>
        <input type="text" id="workerName" placeholder="กรอกชื่อพนักงาน" style="border:none; background:transparent; margin:0; height:auto; padding:0; font-size:12px;">
      </div>
    </div>
  </div>

  <!-- SCREEN 2: pick list -->
  <div class="screen" id="screen-list">
    <div class="header">
      <div class="list-header">
        <button class="back-btn" onclick="goToSelect()"><i class="ti ti-arrow-left"></i></button>
        <div style="flex:1;">
          <div class="list-header-title"><i class="ti ti-package"></i> <span id="listZoneName">Zone</span></div>
          <div class="list-header-sub" id="listDateRange">-</div>
        </div>
        <div class="list-count" id="listCount">0/0</div>
      </div>
      <div class="progress-track" style="background:rgba(255,255,255,0.2);">
        <div class="progress-fill" id="listFill" style="width:0%; background:#fff;"></div>
      </div>
    </div>
    <div class="content" id="listItems"></div>
  </div>

  <!-- SCREEN 3: overview (ทั้ง picker และหัวหน้าใช้หน้าเดียวกัน) -->
  <div class="screen" id="screen-overview">
    <div class="header">
      <div class="overview-topbar">
        <button class="back-btn" onclick="goToSelect()"><i class="ti ti-arrow-left"></i></button>
        <div style="flex:1;">
          <div class="list-header-title"><i class="ti ti-chart-bar"></i> ภาพรวมการ pick</div>
          <div class="list-header-sub" id="ovDateLabel">-</div>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="zone" onclick="switchOverviewMode('zone')">โซน</button>
        <button class="mode-tab" data-mode="door" onclick="switchOverviewMode('door')">ประตู</button>
        <button class="mode-tab" data-mode="dest" onclick="switchOverviewMode('dest')">ปลายทาง</button>
        <button class="mode-tab" data-mode="picker" onclick="switchOverviewMode('picker')">รายคน</button>
      </div>
      <div class="overview-updated"><i class="ti ti-refresh"></i> <span id="ovUpdatedLabel">-</span></div>
      <div class="overview-stats">
        <div class="ov-stat"><div class="ov-stat-label">ทั้งหมด</div><div class="ov-stat-value" id="ovTotal">0</div></div>
        <div class="ov-stat"><div class="ov-stat-label">หยิบแล้ว</div><div class="ov-stat-value" style="color:var(--teal-600);" id="ovPicked">0</div></div>
        <div class="ov-stat"><div class="ov-stat-label">คงเหลือ</div><div class="ov-stat-value" style="color:var(--danger);" id="ovRemaining">0</div></div>
      </div>
      <div id="ovZoneRows"></div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toastText"></span>
    <button id="toastUndoBtn" onclick="undoLast()">ยกเลิก</button>
  </div>
</div>

<script>
/* ---------- CONFIG ---------- */
var USE_MOCK = false; // now pointing at the deployed GAS Web App
var API_URL = 'https://script.google.com/macros/s/AKfycbyPIxttnWpwTbv5Qjbixp8uNhM9YgY8l242DSj2ERzZnHi17Auk0Igm0ZXE-nQNPBnHOw/exec';
var APP_VERSION = 'v1 · 2026-07-20';

/* ---------- MOCK DATA (matches getPickList / getZones shape) ---------- */
var MOCK_ITEMS = [
  {rowKey:2, storBin:'A01-35', material:320040573, materialDesc:'เลย์ร็อค มันฝรั่งแท้13ก12X12กล่อง12F1Y26', batch:202607062, qty:19, uom:'CV', door:'D01', dest:'7-11LPN', status:'หยิบแล้ว'},
  {rowKey:3, storBin:'A01-42', material:320040578, materialDesc:'เลย์ร็อคหมึกย่าง 13ก12X12 กล่อง 12F1 Y26', batch:202607131, qty:8, uom:'CV', door:'D01', dest:'7-11LPN', status:'หยิบแล้ว'},
  {rowKey:4, storBin:'A01-58', material:320040779, materialDesc:'ซันไบทส์ ออริจินัล 15G 8X12 Y26 กล่อง', batch:202607131, qty:13, uom:'CV', door:'D01', dest:'7-11LPN', status:'ยังไม่หยิบ'},
  {rowKey:5, storBin:'A01-61', material:320040575, materialDesc:'เลย์คลาสสิคสาหร่าย 13ก 12X12กล่อง12F1Y26', batch:202607062, qty:43, uom:'CV', door:'D01', dest:'7-11LPN', status:'ยังไม่หยิบ'},
  {rowKey:6, storBin:'A02-06', material:320038965, materialDesc:'เลย์ร็อค บาร์บีคิว 25ก 12X6 กล่อง', batch:202607062, qty:14, uom:'CV', door:'D01', dest:'7-11LPN', status:'ยังไม่หยิบ'}
];
var MOCK_ZONES = [
  {zone:'Zone 1', total:14, picked:2, remaining:12, binRangeLabel:'A01-A02'},
  {zone:'Zone 2', total:22, picked:20, remaining:2, binRangeLabel:'A03-A06'},
  {zone:'Zone 3', total:18, picked:2, remaining:16, binRangeLabel:'B05-B09'}
];

/* ---------- API ---------- */
var MOCK_OVERVIEW_GROUPS = {
  zone: [
    {key:'Zone 1', total:14, picked:12, pickers:'สมชาย ใจดี'},
    {key:'Zone 2', total:22, picked:20, pickers:'วรรณา พรมมา'},
    {key:'Zone 3', total:18, picked:2, pickers:''}
  ],
  door: [
    {key:'D01', total:40, picked:30, pickers:''},
    {key:'D09', total:8, picked:2, pickers:''},
    {key:'D10', total:6, picked:2, pickers:''}
  ],
  dest: [
    {key:'7-11LPN', total:38, picked:28, pickers:''},
    {key:'DC KKN', total:10, picked:4, pickers:''},
    {key:'Lotus', total:6, picked:2, pickers:''}
  ],
  picker: [
    {key:'สมชาย ใจดี', total:12, picked:12, pickers:''},
    {key:'วรรณา พรมมา', total:20, picked:20, pickers:''},
    {key:'อนันต์ คำมูล', total:2, picked:2, pickers:''}
  ]
};

function apiGet(action, params){
  if (USE_MOCK) {
    return new Promise(function(resolve){
      setTimeout(function(){
        if (action === 'getZones') resolve({zones: MOCK_ZONES});
        if (action === 'getPickList') resolve({items: MOCK_ITEMS, total: MOCK_ITEMS.length, picked: MOCK_ITEMS.filter(i=>i.status==='หยิบแล้ว').length});
        if (action === 'getOverview') {
          var groupBy = (params && params.groupBy) || 'zone';
          var groups = MOCK_OVERVIEW_GROUPS[groupBy] || [];
          var total = groups.reduce((s,g)=>s+g.total,0);
          var picked = groups.reduce((s,g)=>s+g.picked,0);
          resolve({
            groupBy: groupBy,
            total: total, picked: picked, remaining: total-picked,
            updatedAt: new Date().toLocaleTimeString('th-TH'),
            groups: groups.map(g=>({key:g.key, total:g.total, picked:g.picked, remaining:g.total-g.picked, pickers:g.pickers}))
          });
        }
      }, 150);
    });
  }
  var qs = Object.keys(params||{}).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
  return fetch(API_URL+'?action='+action+'&'+qs).then(r=>r.json()).catch(function(err){
    return {error: 'เชื่อมต่อ API ไม่ได้: '+err.message};
  });
}
function apiPost(body){
  if (USE_MOCK) {
    var item = MOCK_ITEMS.find(i=>i.rowKey===body.rowKey);
    if (item) item.status = body.status;
    return Promise.resolve({ok:true});
  }
  return fetch(API_URL, {method:'POST', body: JSON.stringify(body)}).then(r=>r.json());
}

/* ---------- STALE-WHILE-REVALIDATE CACHE ---------- */
function cachedApiGet(action, params, cacheKey, onData){
  var cached = localStorage.getItem(cacheKey);
  if (cached) {
    try { onData(JSON.parse(cached), true); } catch(e){}
  }
  apiGet(action, params).then(function(res){
    if (res && !res.error) {
      localStorage.setItem(cacheKey, JSON.stringify(res));
    }
    onData(res, false);
  });
}

/* ---------- STATE ---------- */
var state = { date:null, zone:null, items:[], lastAction:null, scrolledThisVisit:false };

/* ---------- INIT ---------- */
document.getElementById('pickDate').value = new Date().toISOString().slice(0,10);
document.getElementById('workerName').value = localStorage.getItem('pickerName') || '';
document.getElementById('workerName').addEventListener('change', function(e){
  localStorage.setItem('pickerName', e.target.value);
});
document.getElementById('workerName').addEventListener('input', function(e){
  if (e.target.value.trim().length > 0) {
    document.getElementById('workerPill').classList.remove('needs-name');
  }
});
document.getElementById('pickDate').addEventListener('change', loadZones);
loadZones();

function loadZones(){
  var date = document.getElementById('pickDate').value;
  var cacheKey = 'zones:'+date;
  var hasCache = !!localStorage.getItem(cacheKey);
  if (!hasCache) {
    document.getElementById('zoneList').innerHTML = '<div class="loading-state">กำลังโหลดรายการ...</div>';
  }

  cachedApiGet('getZones', {date:date}, cacheKey, function(res){
    renderZones(res);
  });
}

function renderZones(res){
  if (res && res.error) {
    document.getElementById('summaryCard').style.display = 'none';
    document.getElementById('zoneList').innerHTML =
      '<div class="empty-state" style="color:var(--danger);"><i class="ti ti-alert-triangle" style="color:var(--danger);"></i><h3>เชื่อมต่อ Sheet ไม่สำเร็จ</h3><div style="font-size:12px; word-break:break-all;">'+res.error+'</div></div>';
    return;
  }
  var zones = res.zones || [];
    var total = zones.reduce((s,z)=>s+z.total,0);
    var picked = zones.reduce((s,z)=>s+z.picked,0);

    var summaryCard = document.getElementById('summaryCard');
    if (total > 0) {
      summaryCard.style.display = 'block';
      document.getElementById('summaryText').textContent = picked+'/'+total;
      document.getElementById('summaryFill').style.width = Math.round(picked/total*100)+'%';
    } else {
      summaryCard.style.display = 'none';
    }

    var html = zones.map(function(z){
      var pct = z.total ? Math.round(z.picked/z.total*100) : 0;
      var isUnmapped = z.zone === 'ไม่พบโซน';
      var isDone = z.remaining === 0 && z.total > 0;
      var isStarted = z.picked > 0;

      var cardClass = 'zone-card' + (isUnmapped ? ' warning disabled' : '');
      var icon = isDone ? 'ti-circle-check' : 'ti-package';
      var badgeClass = isUnmapped ? 'warning' : (isDone ? 'done' : (isStarted ? 'inprogress' : 'notstarted'));
      var badgeText = isUnmapped ? 'ยังไม่ map โซน' : (isDone ? 'หยิบครบ' : (isStarted ? 'กำลังหยิบ' : 'ยังไม่เริ่ม'));
      var clickHandler = isUnmapped ? 'showUnmappedNotice()' : ('openZone(\''+z.zone+'\')');
      var chevronIcon = isUnmapped ? 'ti-alert-triangle' : 'ti-chevron-right';

      return '<div class="'+cardClass+'" onclick="'+clickHandler+'">'+
        '<div class="zone-icon"><i class="ti '+icon+'"></i></div>'+
        '<div class="zone-card-body">'+
          '<div class="zone-top-row">'+
            '<span class="zone-name">'+z.zone+'</span>'+
            '<span class="zone-badge '+badgeClass+'">'+badgeText+'</span>'+
          '</div>'+
          '<div class="zone-meta">'+z.binRangeLabel+' · '+z.remaining+' รายการรอหยิบ</div>'+
          '<div class="zone-progress-track"><div class="zone-progress-fill" style="width:'+pct+'%"></div></div>'+
        '</div>'+
        '<i class="ti '+chevronIcon+' zone-chevron'+(isUnmapped?' warning-icon':'')+'"></i>'+
      '</div>';
    }).join('');
    document.getElementById('zoneList').innerHTML = html || '<div class="empty-state"><i class="ti ti-calendar-off"></i><h3>ไม่มีงานวันนี้</h3></div>';
}

function hasWorkerName(){
  return document.getElementById('workerName').value.trim().length > 0;
}

function showUnmappedNotice(){
  showToast('Bin เหล่านี้ยังไม่ถูก map เข้าโซน - แจ้งซุปให้เติมชีต Zone Picking', false);
}

function openZone(zone){
  if (!hasWorkerName()) {
    document.getElementById('workerPill').classList.add('needs-name');
    document.getElementById('workerName').focus();
    showToast('กรอกชื่อพนักงานก่อนเริ่มหยิบ', false);
    return;
  }
  state.date = document.getElementById('pickDate').value;
  state.zone = zone;
  document.getElementById('screen-select').classList.remove('active');
  document.getElementById('screen-list').classList.add('active');
  document.getElementById('listZoneName').textContent = zone;
  document.getElementById('listDateRange').textContent = formatDateLabel(state.date);
  document.getElementById('listItems').innerHTML = '<div class="loading-state">กำลังโหลดรายการ...</div>';
  loadPickList();
}

function goToSelect(){
  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-overview').classList.remove('active');
  document.getElementById('screen-select').classList.add('active');
  stopOverviewRefresh();
  loadZones();
}

var ALERT_THRESHOLD = 0.3; // highlight zone red if progress below 30%
var overviewTimer = null;
var overviewMode = 'zone';

function openOverview(){
  document.getElementById('screen-select').classList.remove('active');
  document.getElementById('screen-overview').classList.add('active');
  document.getElementById('ovDateLabel').textContent = formatDateLabel(document.getElementById('pickDate').value);
  loadOverview();
  overviewTimer = setInterval(loadOverview, 30000);
}
function stopOverviewRefresh(){
  if (overviewTimer) { clearInterval(overviewTimer); overviewTimer = null; }
}

function switchOverviewMode(mode){
  overviewMode = mode;
  document.querySelectorAll('.mode-tab').forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('data-mode') === mode);
  });
  document.getElementById('ovZoneRows').innerHTML = '<div class="loading-state">กำลังโหลดรายการ...</div>';
  loadOverview();
}

var MODE_META = {
  zone: {icon:'ti-package', label:function(g){ return g.pickers ? (g.key+' · '+g.pickers) : (g.key+' · ยังไม่มีคนรับ'); }, alert:true, sortByPicked:false},
  door: {icon:'ti-door', label:function(g){ return 'ประตู '+g.key; }, alert:true, sortByPicked:false},
  dest: {icon:'ti-map-pin', label:function(g){ return g.key; }, alert:true, sortByPicked:false},
  picker: {icon:'ti-user', label:function(g){ return g.key; }, alert:false, sortByPicked:true}
};

function loadOverview(){
  apiGet('getOverview', {date: document.getElementById('pickDate').value, groupBy: overviewMode}).then(function(data){
    document.getElementById('ovTotal').textContent = data.total;
    document.getElementById('ovPicked').textContent = data.picked;
    document.getElementById('ovRemaining').textContent = data.remaining;
    document.getElementById('ovUpdatedLabel').textContent = 'อัปเดต ' + (data.updatedAt || '-');

    var groups = data.groups || [];
    if (groups.length === 0) {
      document.getElementById('ovZoneRows').innerHTML = '<div class="empty-state"><i class="ti ti-calendar-off"></i><h3>ไม่มีข้อมูล</h3></div>';
      return;
    }
    var meta = MODE_META[overviewMode] || MODE_META.zone;
    if (meta.sortByPicked) {
      groups = groups.slice().sort(function(a,b){ return b.picked - a.picked; });
    }
    var html = groups.map(function(g){
      var pct = g.total ? Math.round(g.picked/g.total*100) : 0;
      var isAlert = meta.alert && (pct/100) < ALERT_THRESHOLD;
      var icon = isAlert ? 'ti-alert-triangle' : meta.icon;
      var label = meta.label(g);
      return '<div class="ov-zone-row'+(isAlert?' alert':'')+'">'+
        '<div class="ov-zone-icon"><i class="ti '+icon+'"></i></div>'+
        '<div class="ov-zone-body">'+
          '<div class="ov-zone-top"><span class="ov-zone-name">'+label+'</span><span class="ov-zone-count">'+g.picked+'/'+g.total+'</span></div>'+
          '<div class="ov-progress-track"><div class="ov-progress-fill" style="width:'+pct+'%"></div></div>'+
        '</div>'+
      '</div>';
    }).join('');
    document.getElementById('ovZoneRows').innerHTML = html;
  });
}

function loadPickList(){
  state.scrolledThisVisit = false;
  var cacheKey = 'picklist:'+state.date+':'+state.zone;
  cachedApiGet('getPickList', {date:state.date, zone:state.zone}, cacheKey, function(res){
    state.items = (res.items||[]).sort(function(a,b){
      return a.storBin.localeCompare(b.storBin, undefined, {numeric:true});
    });
    renderList(true);
  });
}

function renderList(isInitialRender){
  var items = state.items;
  var picked = items.filter(i=>i.status==='หยิบแล้ว').length;
  document.getElementById('listCount').textContent = picked+'/'+items.length;
  document.getElementById('listFill').style.width = items.length ? Math.round(picked/items.length*100)+'%' : '0%';

  var nextIndex = items.findIndex(i=>i.status!=='หยิบแล้ว');

  if (items.length === 0) {
    document.getElementById('listItems').innerHTML = '<div class="empty-state"><i class="ti ti-package-off"></i><h3>ไม่มีรายการในโซนนี้</h3></div>';
    return;
  }

  var doneBanner = '';
  if (nextIndex === -1) {
    doneBanner = '<div class="done-banner"><i class="ti ti-circle-check"></i><div><div class="done-banner-title">หยิบครบแล้ว '+items.length+'/'+items.length+'</div><div class="done-banner-sub">กดย้อนกลับเพื่อเลือกโซนถัดไป</div></div></div>';
  }

  var html = items.map(function(item, idx){
    var checked = item.status === 'หยิบแล้ว';
    var isNext = idx === nextIndex && !checked;
    var rowClass = 'item-row' + (checked ? ' checked' : '') + (isNext ? ' next' : '');
    var iconClass = checked ? 'ti-check' : 'ti-box';
    return '<div class="'+rowClass+'" '+(isNext?'id="nextItemRow"':'')+'>'+
      '<input type="checkbox" '+(checked?'checked':'')+' onchange="toggleItem('+item.rowKey+', this.checked)">'+
      '<div class="item-icon"><i class="ti '+iconClass+'"></i></div>'+
      '<div style="flex:1; min-width:0;">'+
        '<div class="item-title'+(isNext?' accent':'')+'">'+item.storBin+'</div>'+
        '<div class="item-desc">'+item.materialDesc+'</div>'+
        '<div class="item-batch"><span class="item-batch-label">Batch</span>'+item.batch+'</div>'+
        '<div class="item-sub">'+item.dest+'</div>'+
      '</div>'+
      '<div class="item-right">'+
        '<div class="item-qty">'+item.qty+' <span class="item-qty-unit">'+item.uom+'</span></div>'+
        '<div class="item-door-badge">'+item.door+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('listItems').innerHTML = doneBanner + html;

  if (isInitialRender && !state.scrolledThisVisit) {
    var nextRow = document.getElementById('nextItemRow');
    if (nextRow) {
      nextRow.scrollIntoView({block:'center'});
      state.scrolledThisVisit = true;
    }
  }
}

var toastTimer = null;
function toggleItem(rowKey, isChecked){
  var item = state.items.find(i=>i.rowKey===rowKey);
  if (!item) return;
  var prevStatus = item.status;
  item.status = isChecked ? 'หยิบแล้ว' : 'ยังไม่หยิบ';
  renderList();

  var pickerName = document.getElementById('workerName').value;
  apiPost({action:'updatePickStatus', rowKey:rowKey, status:item.status, pickedBy:pickerName});

  if (isChecked) {
    state.lastAction = {rowKey:rowKey, prevStatus:prevStatus};
    showToast('หยิบแล้ว: '+item.storBin);
  }
}

function undoLast(){
  if (!state.lastAction) return;
  var item = state.items.find(i=>i.rowKey===state.lastAction.rowKey);
  if (item) {
    item.status = state.lastAction.prevStatus;
    apiPost({action:'updatePickStatus', rowKey:item.rowKey, status:item.status, pickedBy:''});
    renderList();
  }
  hideToast();
}

function showToast(text, showUndo){
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastUndoBtn').style.display = (showUndo === false) ? 'none' : 'inline-block';
  var toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, 3000);
}
function hideToast(){
  document.getElementById('toast').classList.remove('show');
}

function formatDateLabel(dateStr){
  var d = new Date(dateStr);
  return d.toLocaleDateString('th-TH', {day:'2-digit', month:'2-digit', year:'numeric'});
}
</script>
</body>
</html>
